name: Build ESP32 Firmware

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install PlatformIO
      run: |
        pip install platformio
        
    - name: Build firmware
      run: |
        cd ${{ github.workspace }}
        pio run
        
    - name: Generate binaries
      run: |
        cd ${{ github.workspace }}
        mkdir -p output
        cp .pio/build/esp32dev/bootloader.bin output/
        cp .pio/build/esp32dev/partitions.bin output/
        cp .pio/build/esp32dev/firmware.bin output/esp32-ble-spam.bin
        ls -la output/
        
    - name: Create Firmware Files
      run: |
        cd ${{ github.workspace }}/output
        cat > README.txt << 'EOF'
        ===========================================
        ESP32 BLE Spam - Web Controller v1.0
        ===========================================
        
        WiFi Config: GMpro / Sangkur87
        
        Files:
        - bootloader.bin : ESP32 bootloader
        - partitions.bin  : Partition table
        - esp32-ble-spam.bin : Main firmware
        
        Flash Instructions:
        --------------------
        1. Connect ESP32 Devkit V1 via USB
        2. Run:
           esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 115200 write_flash \
             0x1000 output/bootloader.bin \
             0x8000 output/partitions.bin \
             0x10000 output/esp32-ble-spam.bin
           
        Or use ESP32 Flash Download Tool (Windows)
        
        Usage:
        ------
        1. Open Serial Monitor (115200 baud)
        2. ESP32 connects to WiFi GMpro
        3. Note the IP address shown
        4. Open browser to http://[IP]
        5. Click START SPAM
        
        Web UI Features:
        - Start/Stop BLE spam
        - Select target device (25 payloads)
        - Adjust interval (100-5000ms)
        - Random MAC toggle
        
        ===========================================
        EOF
        
    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32-ble-spam-firmware
        path: |
          output/*.bin
          output/README.txt
          
    - name: Create Release
      if: github.event_name == 'release' || github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          output/*.bin
          output/README.txt
        body: |
          ## ESP32 BLE Spam Web Controller v1.0
          
          ### WiFi Config
          - SSID: GMpro
          - Password: Sangkur87
          
          ### Flash Instructions
          ```bash
          esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 115200 write_flash \
            0x1000 bootloader.bin \
            0x8000 partitions.bin \
            0x10000 esp32-ble-spam.bin
          ```
          
          ### Usage
          1. Open Serial Monitor (115200 baud)
          2. Note IP address
          3. Open browser to http://[IP]
          4. Click START SPAM
          
          ### Features
          - 25 device payloads
          - Web UI control
          - Random MAC
          - Adjustable interval
        draft: false
        prerelease: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}